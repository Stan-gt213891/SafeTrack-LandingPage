<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geocercas - SafeTrack</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

<header class="navbar">
  <div class="logo-box">
    <img src="assets/logo-safetrack.png" alt="SafeTrack">
  </div>

  <nav class="nav-links">
    <a href="dashboard.html">INICIO</a>
    <a href="miembros.html">MIEMBROS</a>
    <a href="alertas.html">ALERTAS</a>
    <a href="geocercas.html">GEOCERCAS</a>
    <a href="historial.html">HISTORIAL</a>
    <a href="#" id="logoutButton">CERRAR SESIÓN</a>
  </nav>
</header>

<main class="geofence-page">

  <h1>GESTIÓN DE GEOCERCAS</h1>

  <p class="safe-status" id="geofenceStatus">
    🟢 Cargando estado de ubicación...
  </p>

  <section class="geofence-content">

  <div class="geofence-map">
  <div id="geofenceMap"></div>
</div>

   <aside class="geofence-panel" id="geofencePanel">
      <h2>GEOCERCAS CONFIGURADAS</h2>

    

      <div class="geofence-item">
        <h3>📍 Ubicación actual</h3>
        <p>Latitud: <span id="geofenceLatitude">Cargando...</span></p>
        <p>Longitud: <span id="geofenceLongitude">Cargando...</span></p>
      </div>
    </aside>

  </section>

  <section class="add-member-form">
  <h2>Agregar nueva geocerca</h2>

  <input type="text" id="newGeofenceName" placeholder="Nombre de geocerca">
  <input type="number" id="newGeofenceRadius" placeholder="Radio en metros">

  <button id="addGeofenceButton" class="new-geofence-btn">
    + NUEVA GEOCERCA
  </button>

  <p id="geofenceMessage"></p>
</section>

</main>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>

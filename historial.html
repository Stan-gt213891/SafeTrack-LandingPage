<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Rutas - SafeTrack</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
</head>
<body>

<header class="navbar">
  <div class="logo-box">
    <img src="assets/logo-safetrack.png" alt="SafeTrack">
  </div>

  <nav class="nav-links">
    <a href="dashboard.html">INICIO</a>
    <a href="miembros.html">MIEMBROS</a>
    <a href="alertas.html">ALERTAS</a>
    <a href="geocercas.html">GEOCERCAS</a>
    <a href="historial.html">HISTORIAL</a>
    <a href="#" id="logoutButton">CERRAR SESIÓN</a>
  </nav>
</header>

<main class="history-page">

  <section class="map-area">
  <div id="historyMap"></div>
</section>

  <aside class="history-panel">
    <h2>CONSULTAR HISTORIAL</h2>

    <p class="dependent">
  Dependiente:<br>
  <select id="historyDependentSelect">
    <option value="">Cargando dependientes...</option>
  </select>
</p>

    <div class="history-card">
   <p>📅 <strong>Fecha:</strong><br><span id="historyDate">Cargando...</span></p>
      <p>🕘 <strong>Salida:</strong><br><span id="historyStartTime">Cargando...</span></p>
<p>🕘 <strong>Llegada:</strong><br><span id="historyEndTime">Cargando...</span></p>
      <p>📍 <strong>Destino:</strong><br><span id="historyDestination">Cargando...</span></p>
      <p>🌎 <strong>Latitud:</strong><br><span id="historyLatitude">Cargando...</span></p>
      <p>🌎 <strong>Longitud:</strong><br><span id="historyLongitude">Cargando...</span></p>
      <p>🟢 <strong>Estado:</strong><br><span id="historyStatus">Cargando estado...</span></p>
    </div>

    <button id="historyDetailsButton" class="details-btn">
  Ver detalles
</button>

  </aside>

</main>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SafeTrack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo-box">
    <img src="assets/logo-safetrack.png" alt="SafeTrack">
  </div>

  <nav class="nav-links">
    <a href="index.html" data-i18n="navHome">INICIO</a>
    <a href="index.html#funciona" data-i18n="navHowWorks">CÓMO FUNCIONA</a>
    <a href="index.html#ventajas" data-i18n="navAdvantages">VENTAJAS</a>
    <a href="index.html#planes" data-i18n="navPlans">PLANES</a>
    <a href="index.html#contacto" data-i18n="navContact">CONTACTO</a>
    <a href="login.html" data-i18n="navLogin">INICIAR SESIÓN</a>
    <a href="registro.html" data-i18n="navRegister">REGISTRARSE</a>

    <select id="languageSelector">
      <option value="es">ES</option>
      <option value="en">EN</option>
    </select>
  </nav>
</header>

<div class="auth-page">
  <div class="auth-card">

    <h1 data-i18n="loginTitle">INICIAR SESIÓN</h1>

    <label data-i18n="emailLabel">CORREO ELECTRÓNICO</label>
    <div class="input-box">
      <span>✉️</span>
      <input id="loginEmail" type="email" placeholder="ejemplo@correo.com">
    </div>

    <label data-i18n="passwordLabel">CONTRASEÑA</label>
    <div class="input-box">
      <span>🔒</span>
      <input id="loginPassword" type="password" placeholder="********">
    </div>

    <button id="loginButton" class="auth-button" data-i18n="loginButtonText">
      INGRESAR
    </button>

    <p id="loginMessage" class="auth-text"></p>

    <p class="auth-text" data-i18n="noAccountText">¿No tienes una cuenta?</p>
    <a href="registro.html" class="auth-link" data-i18n="registerHere">Regístrate aquí</a>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SafeTrack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo-box">
    <img src="assets/logo-safetrack.png" alt="SafeTrack">
  </div>

  <nav class="nav-links">
    <a href="index.html">INICIO</a>
    <a href="index.html#funciona">COMO FUNCIONA</a>
    <a href="index.html#ventajas">VENTAJAS</a>
    <a href="index.html#planes">PLANES</a>
    <a href="index.html#contacto">CONTACTO</a>
    <a href="login.html">INICIAR SESIÓN</a>
    <a href="registro.html">REGISTRARSE</a>
  </nav>
</header>

<div class="auth-page">
  <div class="auth-card">

    <h1>INICIAR SESIÓN</h1>

    <label>CORREO ELECTRÓNICO</label>
    <div class="input-box">
      <span>✉️</span>
      <input id="loginEmail" type="email" placeholder="ejemplo@correo.com">
    </div>

    <label>CONTRASEÑA</label>
    <div class="input-box">
      <span>🔒</span>
      <input id="loginPassword" type="password" placeholder="********">
    </div>

    <button id="loginButton" class="auth-button">
      INGRESAR
    </button>

    <p id="loginMessage" class="auth-text"></p>

    <p class="auth-text">¿No tienes una cuenta?</p>
    <a href="registro.html" class="auth-link">Regístrate aquí</a>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - SafeTrack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo-box">
    <img src="assets/logo-safetrack.png" alt="SafeTrack">
  </div>

  <nav class="nav-links">
    <a href="index.html" data-i18n="navHome">INICIO</a>
    <a href="index.html#funciona" data-i18n="navHowWorks">COMO FUNCIONA</a>
    <a href="index.html#ventajas" data-i18n="navAdvantages">VENTAJAS</a>
    <a href="index.html#planes" data-i18n="navPlans">PLANES</a>
    <a href="index.html#contacto" data-i18n="navContact">CONTACTO</a>
    <a href="login.html" data-i18n="navLogin">INICIAR SESIÓN</a>
    <a href="registro.html" data-i18n="navRegister">REGISTRARSE</a>

    <select id="languageSelector">
      <option value="es">ES</option>
      <option value="en">EN</option>
    </select>
  </nav>
</header>

<div class="auth-page">
  <div class="auth-card">

    <h1 data-i18n="registerTitle">CREAR CUENTA</h1>

    <label data-i18n="fullNameLabel">NOMBRE COMPLETO</label>
    <div class="input-box">
      <span>👤</span>
      <input id="registerFullName" type="text" placeholder="Nombre y apellido">
    </div>

    <label data-i18n="emailLabel">CORREO ELECTRÓNICO</label>
    <div class="input-box">
      <span>✉️</span>
      <input id="registerEmail" type="email" placeholder="ejemplo@correo.com">
    </div>

    <label data-i18n="passwordLabel">CONTRASEÑA</label>
    <div class="input-box">
      <span>🔒</span>
      <input id="registerPassword" type="password" placeholder="********">
    </div>

    <label data-i18n="confirmPasswordLabel">CONFIRMAR CONTRASEÑA</label>
    <div class="input-box">
      <span>🔒</span>
      <input id="confirmPassword" type="password" placeholder="********">
    </div>

    <button id="registerButton" class="auth-button" data-i18n="createAccountButton">
      CREAR CUENTA
    </button>

    <p id="registerMessage" class="auth-text"></p>

    <p class="auth-text" data-i18n="alreadyAccountText">
      ¿Ya tienes una cuenta?
    </p>

    <a href="login.html" class="auth-link" data-i18n="loginHere">
      Iniciar sesión
    </a>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>

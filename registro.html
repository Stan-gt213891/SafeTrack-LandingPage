<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro - SafeTrack</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo-box">
    <img src="assets/logo-safetrack.png" alt="SafeTrack">
  </div>

  <nav class="nav-links">
    <a href="index.html">INICIO</a>
    <a href="index.html#funciona">COMO FUNCIONA</a>
    <a href="index.html#ventajas">VENTAJAS</a>
    <a href="index.html#planes">PLANES</a>
    <a href="index.html#contacto">CONTACTO</a>
    <a href="login.html">INICIAR SESIÓN</a>
    <a href="registro.html">REGISTRARSE</a>
  </nav>
</header>

<div class="auth-page">
  <div class="auth-card">

    <h1>CREAR CUENTA</h1>

    <label>NOMBRE COMPLETO</label>
    <div class="input-box">
      <span>👤</span>
      <input id="registerFullName" type="text" placeholder="Nombre y apellido">
    </div>

    <label>CORREO ELECTRÓNICO</label>
    <div class="input-box">
      <span>✉️</span>
      <input id="registerEmail" type="email" placeholder="ejemplo@correo.com">
    </div>

    <label>CONTRASEÑA</label>
    <div class="input-box">
      <span>🔒</span>
      <input id="registerPassword" type="password" placeholder="********">
    </div>

    <label>CONFIRMAR CONTRASEÑA</label>
    <div class="input-box">
      <span>🔒</span>
      <input id="confirmPassword" type="password" placeholder="********">
    </div>

    <button id="registerButton" class="auth-button">
      CREAR CUENTA
    </button>

    <p id="registerMessage" class="auth-text"></p>

    <p class="auth-text">
      ¿Ya tienes una cuenta?
    </p>

    <a href="login.html" class="auth-link">
      Iniciar sesión
    </a>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
